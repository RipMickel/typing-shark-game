<!DOCTYPE html>
<html>
<head>
  <title>Typing Shark - Evolution</title>
  <style>
    body {
      margin: 0;
      background: #001018;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    canvas {
      background: linear-gradient(#003049, #001018);
      display: block;
      margin: 10px auto;
      border: 2px solid #00f7ff;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 320px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-top: 10px;
    }

    #menu, #gameOver {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .easy { background: #2ecc71; }
    .medium { background: #f1c40f; }
    .hard { background: #e67e22; }
    .extreme { background: #e74c3c; }

    #hud {
      display: flex;
      justify-content: center;
      gap: 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>🦈 Typing Shark: Evolution</h1>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Health: <span id="health">3</span></div>
  <div>Combo: <span id="combo">0</span></div>
  <div>Level: <span id="level">Easy</span></div>
</div>

<canvas id="game" width="900" height="450"></canvas>

<input id="typebox" placeholder="type shark word..." autofocus />

<!-- MENU -->
<div id="menu">
  <h1>Choose Difficulty</h1>
  <button class="easy" onclick="startGame('easy')">Easy</button>
  <button class="medium" onclick="startGame('medium')">Medium</button>
  <button class="hard" onclick="startGame('hard')">Hard</button>
  <button class="extreme" onclick="startGame('extreme')">Extreme</button>
</div>

<!-- GAME OVER -->
<div id="gameOver" style="display:none;">
  <h1>💀 Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const sharkImg = new Image();
sharkImg.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Great_white_shark_size.svg/512px-Great_white_shark_size.svg.png";

const words = [
  "SHARK","OCEAN","WAVE","DEEP","HUNT","BLUE",
  "CORAL","REEF","CURRENT","TIDE","FISH","WATER",
  "BITE","SURGE","AQUA","DEPTH"
];

let sharks = [];
let particles = [];

let score = 0;
let health = 3;
let combo = 0;
let speed = 1;
let difficulty = "easy";
let running = false;

function settings(level) {
  if (level === "easy") return { speed: 2, health: 5 };
  if (level === "medium") return { speed: 3, health: 4 };
  if (level === "hard") return { speed: 4, health: 3 };
  if (level === "extreme") return { speed: 6, health: 2 };
}

function spawnShark() {
  sharks.push({
    x: 900,
    y: Math.random() * 380 + 30,
    word: words[Math.floor(Math.random() * words.length)],
    hit: ""
  });
}

function explode(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 30
    });
  }
}

document.getElementById("typebox").addEventListener("input", e => {
  let val = e.target.value.toUpperCase();

  sharks.forEach(s => {
    if (s.word.startsWith(val)) s.hit = val;
  });

  for (let i = 0; i < sharks.length; i++) {
    if (sharks[i].word === val) {
      explode(sharks[i].x, sharks[i].y);

      sharks.splice(i, 1);
      spawnShark();

      score += 10 + combo;
      combo++;

      e.target.value = "";
      updateHUD();
      break;
    }
  }
});

function updateHUD() {
  document.getElementById("score").innerText = score;
  document.getElementById("health").innerText = health;
  document.getElementById("combo").innerText = combo;
  document.getElementById("level").innerText = difficulty.toUpperCase();
}

function startGame(level) {
  difficulty = level;
  const set = settings(level);

  speed = set.speed;
  health = set.health;

  document.getElementById("menu").style.display = "none";
  running = true;

  for (let i = 0; i < 6; i++) spawnShark();

  loop();
}

function update() {
  speed += 0.0005;

  sharks.forEach((s, i) => {
    s.x -= speed;

    if (s.x < -80) {
      sharks.splice(i, 1);
      spawnShark();

      health--;
      combo = 0;
      updateHUD();

      if (health <= 0) {
        running = false;
        document.getElementById("finalScore").innerText = "Score: " + score;
        document.getElementById("gameOver").style.display = "flex";
      }
    }
  });

  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    if (p.life <= 0) particles.splice(i, 1);
  });
}

function drawShark(s) {
  ctx.drawImage(sharkImg, s.x - 40, s.y - 25, 80, 50);

  ctx.fillStyle = s.hit ? "#00ff88" : "white";
  ctx.font = "16px Arial";
  ctx.fillText(s.word, s.x - 30, s.y - 30);
}

function draw() {
  ctx.fillStyle = "#001018";
  ctx.fillRect(0, 0, 900, 450);

  particles.forEach(p => {
    ctx.fillStyle = "orange";
    ctx.fillRect(p.x, p.y, 3, 3);
  });

  sharks.forEach(drawShark);
}

function loop() {
  if (!running) return;

  update();
  draw();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
