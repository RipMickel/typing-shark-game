<!DOCTYPE html>
<html>
<head>
  <title>Typing Shark - Evolution</title>
  <style>
    body {
      margin: 0;
      background: #001018;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
      display: flex;
    }

    #gameContainer { flex: 1; }

    canvas {
      background: linear-gradient(#003049, #001018);
      display: block;
      margin: 10px auto;
      border: 2px solid #00f7ff;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 320px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-top: 10px;
    }

    #menu, #gameOver {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .easy { background: #2ecc71; }
    .medium { background: #f1c40f; }
    .hard { background: #e67e22; }
    .extreme { background: #e74c3c; }

    #hud {
      display: flex;
      justify-content: center;
      gap: 25px;
      font-size: 18px;
      flex-wrap: wrap;
    }

    #scoreboard {
      width: 250px;
      background: #000c12;
      border-left: 2px solid #00f7ff;
      padding: 10px;
      overflow-y: auto;
    }

    .score-entry {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #033;
    }
  </style>
</head>

<body>

<div id="gameContainer">
<h1>🦈 Typer Shark</h1>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Health: <span id="health">0</span></div>
  <div>Combo: <span id="combo">0</span></div>
  <div>Level: <span id="level">1</span></div>
  <div>XP: <span id="xp">0</span>/<span id="xpNext">100</span></div>
</div>

<canvas id="game" width="900" height="450"></canvas>
<input id="typebox" placeholder="type shark word..." disabled />
</div>

<div id="scoreboard">
  <h2>🏆 Scoreboard</h2>
  <div id="scoreList"></div>
</div>

<div id="menu">
  <h1>Enter Username</h1>
  <input id="username" placeholder="Enter your name" />
  <h2>Choose Difficulty</h2>
  <button class="easy" onclick="startGame('easy')">Easy</button>
  <button class="medium" onclick="startGame('medium')">Medium</button>
  <button class="hard" onclick="startGame('hard')">Hard</button>
  <button class="extreme" onclick="startGame('extreme')">Extreme</button>
</div>

<div id="gameOver" style="display:none;">
  <h1>Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let sharks = [];
let particles = [];

let score = 0, health = 3, combo = 0;
let speed = 2, difficulty = "easy", running = false;

let level = 1, xp = 0, xpToNext = 100;
let slowTimer = 0, spawnAccumulator = 0, sharksPerSecond = 0;

let username = "";

/* SCOREBOARD */
let scoreboard = JSON.parse(localStorage.getItem("scoreboard") || "[]");

function saveScore() {
  let existing = scoreboard.find(s => s.name.toLowerCase() === username.toLowerCase());

  if (existing) {
    if (score > existing.score) existing.score = score;
  } else {
    scoreboard.push({ name: username, score: score });
  }

  scoreboard.sort((a, b) => b.score - a.score);
  scoreboard = scoreboard.slice(0, 10);

  localStorage.setItem("scoreboard", JSON.stringify(scoreboard));
  renderScoreboard();
}

function renderScoreboard() {
  const list = document.getElementById("scoreList");
  list.innerHTML = "";
  scoreboard.forEach(s => {
    const div = document.createElement("div");
    div.className = "score-entry";
    div.innerHTML = `<span>${s.name}</span><span>${s.score}</span>`;
    list.appendChild(div);
  });
}
renderScoreboard();

/* WORDS */
const words = [
"APP","WEB","CPU","RAM","HTML","CSS","JS","SQL","DATA","NODE",
"SERVER","CLIENT","SCRIPT","SYSTEM","MEMORY","THREAD","OBJECT"
];

/* GAME LOGIC */
function spawnShark() {
  sharks.push({
    x: canvas.width,
    y: Math.random() * 380 + 30,
    word: words[Math.floor(Math.random() * words.length)],
    hit: "",
    type: Math.random() < 0.2 ? "fast" : "normal"
  });
}

function startGame(levelChoice) {
  username = document.getElementById("username").value.trim();
  if (!username) return alert("Enter username!");

  difficulty = levelChoice;

  if (levelChoice === "easy") { speed = 1.5; health = 5; sharksPerSecond = 0.02; }
  if (levelChoice === "medium") { speed = 2.5; health = 4; sharksPerSecond = 0.04; }
  if (levelChoice === "hard") { speed = 3.5; health = 3; sharksPerSecond = 0.05; }
  if (levelChoice === "extreme") { speed = 5; health = 2; sharksPerSecond = 0.07; }

  sharks = [];
  particles = [];
  score = 0; combo = 0;
  level = 1; xp = 0; xpToNext = 100;

  document.getElementById("menu").style.display = "none";
  document.getElementById("typebox").disabled = false;
  document.getElementById("typebox").focus();

  running = true;
  updateHUD();
  loop();
}

document.getElementById("typebox").addEventListener("input", e => {
  let val = e.target.value.toUpperCase();

  for (let i = 0; i < sharks.length; i++) {
    if (sharks[i].word === val) {
      sharks.splice(i, 1);

      score += 10;
      combo++;
      xp += 20;

      e.target.value = "";
      updateHUD();
      return;
    }
  }
});

function updateHUD() {
  scoreEl.textContent = score;
  healthEl.textContent = health;
  comboEl.textContent = combo;
  levelEl.textContent = level;
  xpEl.textContent = xp;
  xpNextEl.textContent = xpToNext;
}

const scoreEl = document.getElementById("score");
const healthEl = document.getElementById("health");
const comboEl = document.getElementById("combo");
const levelEl = document.getElementById("level");
const xpEl = document.getElementById("xp");
const xpNextEl = document.getElementById("xpNext");

function update() {
  spawnAccumulator += sharksPerSecond;

  while (spawnAccumulator >= 1) {
    spawnShark();
    spawnAccumulator--;
  }

  for (let i = sharks.length - 1; i >= 0; i--) {
    let s = sharks[i];
    s.x -= speed * (s.type === "fast" ? 1.5 : 1);

    if (s.x < -80) {
      sharks.splice(i, 1);
      health--;
      combo = 0;
      updateHUD();

      if (health <= 0) {
        running = false;
        saveScore();
        document.getElementById("finalScore").innerText = "Score: " + score;
        document.getElementById("gameOver").style.display = "flex";
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  sharks.forEach(s => {
    ctx.fillStyle = s.type === "fast" ? "#00ff88" : "#00c8ff";
    ctx.fillRect(s.x, s.y, 60, 30);

    ctx.fillStyle = "white";
    ctx.fillText(s.word, s.x + 5, s.y + 20);
  });
}

function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
