<!DOCTYPE html>
<html>
<head>
  <title>Typing Shark - Evolution</title>
  <style>
    body {
      margin: 0;
      background: #001018;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    canvas {
      background: linear-gradient(#003049, #001018);
      display: block;
      margin: 10px auto;
      border: 2px solid #bbddde;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 320px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-top: 10px;
    }

    #menu, #gameOver {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .easy { background: #2ecc71; }
    .medium { background: #f1c40f; }
    .hard { background: #e67e22; }
    .extreme { background: #e74c3c; }

    #hud {
      display: flex;
      justify-content: center;
      gap: 25px;
      font-size: 18px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<h1>🦈 Typer Shark</h1>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Health: <span id="health">0</span></div>
  <div>Combo: <span id="combo">0</span></div>
  <div>Level: <span id="level">1</span></div>
  <div>XP: <span id="xp">0</span>/<span id="xpNext">100</span></div>
</div>

<canvas id="game" width="900" height="450"></canvas>
<input id="typebox" placeholder="type shark word..." disabled />

<div id="menu">
  <h1>🦈 Choose Difficulty</h1>
  <button class="easy" onclick="startGame('easy')">Easy</button>
  <button class="medium" onclick="startGame('medium')">Medium</button>
  <button class="hard" onclick="startGame('hard')">Hard</button>
  <button class="extreme" onclick="startGame('extreme')">Extreme</button>
</div>

<div id="gameOver" style="display:none;">
  <h1>💀 Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let sharks = [];
let particles = [];

let score = 0;
let health = 3;
let combo = 0;
let speed = 2;
let difficulty = "easy";
let running = false;

let level = 1;
let xp = 0;
let xpToNext = 100;

let slowTimer = 0;
let spawnAccumulator = 0;
let sharksPerSecond = 0;

const longWords = [
  "CURRENT","CORAL","DEPTH","SURGE","OCEANIC","TIDAL","ABYSS","MARINE","VOYAGE","DRIFTING",
  "TSUNAMI","HORIZON","SEABED","UNDERWATER","PRESSURE","WATERFLOW","BLUEWHALE","SHIPWRECK",
  "ANCHORAGE","SUBMERGED","EXPLORATION","NAVIGATION","TURBULENCE","HYDROTHERMAL","BIOLUMINESCENCE",
  "ECOSYSTEM","CONTINENTAL","SALTWATER","PLANKTONIC","MIGRATION","CURRENTFLOW","DEEPSEA","OXYGENATION"
];

const shortWords = [
  "WAVE","FISH","BLUE","DEEP","BITE","ICS","AQUA","REEF",
  "SEA","FIN","EEL","INK","TIDE","FOAM","SURF","KELP",
  "BASS","CLAM","CRAB","DIVE","GULF","HULL","MAKO","PEARL",
  "SQUID","SHARK","CORAL","DRIFT","SHELL","SAND","REEF","SWIM"
];

// ---------- DRAW SHARK (STRETCH) ----------
function drawSharkBody(x, y, type, slowed=false, word="") {
  let color = "#00c8ff";

  if (type === "fast") color = "#00ff88";
  if (type === "tank") color = "#ffcc00";
  if (type === "zigzag") color = "#ff66ff";
  if (slowed) color = "#66e0ff";

  ctx.font = "bold 15px Arial";
  let textWidth = ctx.measureText(word).width;

  let baseWidth = 40;
  let extra = Math.max(0, textWidth - 50);
  let width = baseWidth + extra * 0.5;

  ctx.fillStyle = color;

  ctx.beginPath();
  ctx.ellipse(x, y, width, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x - width, y);
  ctx.lineTo(x - width - 25, y - 12);
  ctx.lineTo(x - width - 25, y + 12);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(x + width * 0.3, y - 5, 3, 0, Math.PI * 2);
  ctx.fill();
}

// ---------- WORD ----------
function drawWord(s) {
  ctx.font = "bold 15px Arial";

  const fullWidth = ctx.measureText(s.word).width;
  const startX = s.x - fullWidth / 2;
  const y = s.y + 5;

  ctx.fillStyle = "#00ff88";
  ctx.fillText(s.hit, startX, y);

  ctx.fillStyle = "black";
  ctx.fillText(
    s.word.slice(s.hit.length),
    startX + ctx.measureText(s.hit).width,
    y
  );
}

// ---------- REST (UNCHANGED CORE) ----------
function getWord(type) {
  if (type === "fast") return shortWords[Math.floor(Math.random() * shortWords.length)];
  if (difficulty === "easy") return longWords[Math.floor(Math.random() * longWords.length)];
  return [...shortWords, ...longWords][Math.floor(Math.random() * (shortWords.length + longWords.length))];
}

function spawnShark() {
  let type = "normal";
  sharks.push({
    x: 900,
    y: Math.random() * 380 + 30,
    word: getWord(type),
    hit: "",
    push: 0,
    type: type,
    hp: 1
  });
}

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("typebox").disabled = false;
  document.getElementById("typebox").focus();
  running = true;
  loop();
}

function update() {
  sharks.forEach(s => s.x -= 2);
}

function draw() {
  ctx.fillStyle = "#001018";
  ctx.fillRect(0, 0, 900, 450);

  sharks.forEach(s => {
    drawSharkBody(s.x, s.y, s.type, false, s.word); // ✅ pass word
    drawWord(s);
  });
}

function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
