<!DOCTYPE html>
<html>
<head>
  <title>Typing Shark - Evolution</title>
  <style>
    body {
      margin: 0;
      background: #001018;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
      display: flex;
    }

    #gameContainer {
      flex: 1;
    }

    canvas {
      background: linear-gradient(#003049, #001018);
      display: block;
      margin: 10px auto;
      border: 2px solid #00f7ff;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 320px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-top: 10px;
    }

    #menu, #gameOver {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .easy { background: #2ecc71; }
    .medium { background: #f1c40f; }
    .hard { background: #e67e22; }
    .extreme { background: #e74c3c; }

    #hud {
      display: flex;
      justify-content: center;
      gap: 25px;
      font-size: 18px;
      flex-wrap: wrap;
    }

    #scoreboard {
      width: 250px;
      background: #000c12;
      border-left: 2px solid #00f7ff;
      padding: 10px;
      overflow-y: auto;
    }

    #scoreboard h2 {
      margin-top: 0;
    }

    .score-entry {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #033;
    }
  </style>
</head>
<body>

<div id="gameContainer">
<h1>🦈 Typer Shark: WayLingaw Developed by: mickel.dev</h1>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Health: <span id="health">0</span></div>
  <div>Combo: <span id="combo">0</span></div>
  <div>Level: <span id="level">1</span></div>
  <div>XP: <span id="xp">0</span>/<span id="xpNext">100</span></div>
</div>

<canvas id="game" width="900" height="450"></canvas>

<input id="typebox" placeholder="type shark word..." disabled />
</div>

<div id="scoreboard">
  <h2>🏆 Scoreboard</h2>
  <div id="scoreList"></div>
</div>

<div id="menu">
  <h1>🦈 Enter Username</h1>
  <input id="username" placeholder="Enter your name" />
  <h2>Choose Difficulty</h2>
  <button class="easy" onclick="startGame('easy')">Easy</button>
  <button class="medium" onclick="startGame('medium')">Medium</button>
  <button class="hard" onclick="startGame('hard')">Hard</button>
  <button class="extreme" onclick="startGame('extreme')">Extreme</button>
</div>

<div id="gameOver" style="display:none;">
  <h1>💀 Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let sharks = [];
let particles = [];

let score = 0;
let health = 3;
let combo = 0;
let speed = 2;
let difficulty = "easy";
let running = false;

let level = 1;
let xp = 0;
let xpToNext = 100;

let slowTimer = 0;
let spawnAccumulator = 0;
let sharksPerSecond = 0;

let username = "";

/* SCORE STORAGE */
let scoreboard = JSON.parse(localStorage.getItem("scoreboard") || "[]");

function saveScore() {
  let existing = scoreboard.find(s => s.name.toLowerCase() === username.toLowerCase());

  if (existing) {
    if (score > existing.score) {
      existing.score = score;
    }
  } else {
    scoreboard.push({ name: username, score: score });
  }

  scoreboard.sort((a, b) => b.score - a.score);
  scoreboard = scoreboard.slice(0, 10);

  localStorage.setItem("scoreboard", JSON.stringify(scoreboard));
  renderScoreboard();
}

function renderScoreboard() {
  const list = document.getElementById("scoreList");
  list.innerHTML = "";
  scoreboard.forEach(s => {
    const div = document.createElement("div");
    div.className = "score-entry";
    div.innerHTML = `<span>${s.name}</span><span>${s.score}</span>`;
    list.appendChild(div);
  });
}

renderScoreboard();

const longWords = ["CURRENT","CORAL","DEPTH","SURGE","OCEANIC","TIDAL","ABYSS","MARINE","VOYAGE","DRIFTING"];
const shortWords = ["WAVE","FISH","BLUE","DEEP","BITE","AQUA","REEF"];

function getSharkType() {
  if (level < 3) return "normal";
  let r = Math.random();
  if (level >= 6 && r < 0.2) return "tank";
  if (level >= 4 && r < 0.4) return "zigzag";
  if (r < 0.7) return "fast";
  return "normal";
}

function drawSharkBody(x, y, type, slowed=false) {
  let color = "#00c8ff";
  if (type === "fast") color = "#00ff88";
  if (type === "tank") color = "#ffcc00";
  if (type === "zigzag") color = "#ff66ff";
  if (slowed) color = "#66e0ff";

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(x, y, 40, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x - 40, y);
  ctx.lineTo(x - 65, y - 12);
  ctx.lineTo(x - 65, y + 12);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(x + 12, y - 5, 3, 0, Math.PI * 2);
  ctx.fill();
}

function getWord(type) {
  if (type === "fast") return shortWords[Math.floor(Math.random() * shortWords.length)];
  if (difficulty === "easy") return longWords[Math.floor(Math.random() * longWords.length)];
  return [...shortWords, ...longWords][Math.floor(Math.random() * (shortWords.length + longWords.length))];
}

function spawnShark() {
  let type = getSharkType();
  sharks.push({
    x: 900,
    y: Math.random() * 380 + 30,
    baseY: 0,
    zigzagDir: Math.random() < 0.5 ? 1 : -1,
    word: getWord(type),
    hit: "",
    push: 0,
    type: type,
    hp: type === "tank" ? 2 : 1
  });
  sharks[sharks.length - 1].baseY = sharks[sharks.length - 1].y;
}

function explode(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 30
    });
  }
}

function settings(level) {
  if (level === "easy") return { speed: 1.1, health: 5, rate: 3 / 850 };
  if (level === "medium") return { speed: 2.5, health: 4, rate: 6 / 800 };
  if (level === "hard") return { speed: 3.5, health: 3, rate: 4 / 700 };
  if (level === "extreme") return { speed: 5, health: 2, rate: 3 / 550 };
}

function checkLevelUp() {
  if (xp >= xpToNext) {
    xp -= xpToNext;
    level++;
    speed += 0.3;
    sharksPerSecond += 0.002;
    health = Math.min(health + 1, 10);
    xpToNext = Math.floor(xpToNext * 1.25);
  }
}

document.getElementById("typebox").addEventListener("input", e => {
  let val = e.target.value.toUpperCase();
  sharks.forEach(s => s.hit = s.word.startsWith(val) ? val : "");

  for (let i = 0; i < sharks.length; i++) {
    if (sharks[i].word === val) {
      let s = sharks[i];
      s.hp--;

      if (s.hp <= 0) {
        explode(s.x, s.y);
        let multiplier = 1 + Math.min(combo * 0.2, 3);
        score += Math.floor(10 * multiplier);
        combo++;
        xp += 20 + combo * 5;
        checkLevelUp();
        sharks.splice(i, 1);
      } else {
        s.word = getWord("fast");
        s.hit = "";
      }

      slowTimer = 40 + combo * 5;
      s.push = 10 + combo * 1.5;

      e.target.value = "";
      updateHUD();
      break;
    }
  }
});

function updateHUD() {
  document.getElementById("score").innerText = score;
  document.getElementById("health").innerText = health;
  document.getElementById("combo").innerText = combo;
  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = xp;
  document.getElementById("xpNext").innerText = xpToNext;
}

function startGame(levelChoice) {
  username = document.getElementById("username").value.trim();
  if (!username) {
    alert("Please enter a username!");
    return;
  }

  difficulty = levelChoice;
  const set = settings(levelChoice);

  speed = set.speed;
  health = set.health;
  sharksPerSecond = set.rate;

  sharks = [];
  particles = [];
  score = 0;
  combo = 0;

  level = 1;
  xp = 0;
  xpToNext = 100;

  slowTimer = 0;
  spawnAccumulator = 0;

  document.getElementById("menu").style.display = "none";
  document.getElementById("typebox").disabled = false;
  document.getElementById("typebox").focus();

  running = true;
  loop();
  updateHUD();
}

function update() {
  let currentSpeed = speed;

  if (slowTimer > 0) {
    currentSpeed *= 0.6;
    slowTimer--;
  }

  spawnAccumulator += sharksPerSecond;

  while (spawnAccumulator >= 1) {
    spawnShark();
    spawnAccumulator--;
  }

  for (let i = sharks.length - 1; i >= 0; i--) {
    let s = sharks[i];
    let moveSpeed = currentSpeed;

    if (s.type === "fast") moveSpeed *= 1.8;

    if (s.push > 0) {
      s.x += s.push;
      s.push *= 0.8;
    }

    s.x -= moveSpeed;

    if (s.type === "zigzag") {
      s.y += Math.sin(Date.now() * 0.005 + s.x * 0.05) * 2;
    }

    if (s.x < -80) {
      sharks.splice(i, 1);
      health--;
      combo = 0;
      updateHUD();

      if (health <= 0) {
        running = false;
        saveScore();
        document.getElementById("finalScore").innerText = "Score: " + score;
        document.getElementById("gameOver").style.display = "flex";
      }
    }
  }

  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  });
}

function drawWord(s) {
  ctx.font = "bold 14px Arial";

  const fullWidth = ctx.measureText(s.word).width;
  const startX = s.x - fullWidth / 2;
  const y = s.y + 5;

  ctx.fillStyle = "#00ff88";
  ctx.fillText(s.hit, startX, y);

  ctx.fillStyle = "black";
  ctx.fillText(
    s.word.slice(s.hit.length),
    startX + ctx.measureText(s.hit).width,
    y
  );
}

function draw() {
  ctx.fillStyle = "#001018";
  ctx.fillRect(0, 0, 900, 450);

  particles.forEach(p => {
    ctx.fillStyle = "orange";
    ctx.fillRect(p.x, p.y, 3, 3);
  });

  sharks.forEach(s => {
    drawSharkBody(s.x, s.y, s.type, slowTimer > 0);
    drawWord(s);
  });
}

function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
